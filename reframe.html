<!DOCTYPE html>
<html>
<head>
<title>Thought Reframe | CalmConnect</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background:linear-gradient(to bottom,#fde2e4,#fff1f2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    width:420px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    animation:fadeIn 1.5s;
}

h2{
    text-align:center;
}

textarea{
    width:100%;
    height:80px;
    padding:12px;
    border-radius:12px;
    border:1px solid #ccc;
    margin-top:15px;
}

button{
    margin-top:15px;
    padding:12px 30px;
    border:none;
    border-radius:25px;
    background:#f28482;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#output{
    margin-top:20px;
    padding:15px;
    background:#fef6f6;
    border-radius:12px;
    font-size:16px;
    display:none;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1;}
}
</style>
</head>

<body>

<div class="container">
<h2>🌸 Thought Reframe</h2>

<p>Write a troubling thought:</p>
<textarea id="thought"></textarea>

<button onclick="reframe()">Reframe</button>

<div id="output"></div>
</div>

<script>
function reframe(){
    let t=document.getElementById("thought").value.toLowerCase();
    let output=document.getElementById("output");

    if(t===""){
        alert("Write something first 💚");
        return;
    }

    let response="This is difficult, but it does not define you.";

    if(t.includes("fail")) response="A setback is not a failure. You are learning.";
    if(t.includes("alone")) response="You are not alone. Support exists.";
    if(t.includes("stress")) response="Stress shows you care. Take one step at a time.";
    if(t.includes("can't")) response="You may not do everything, but you can do something.";

    output.style.display="block";
    output.innerText="💚 Reframed Thought:\n"+response;
}
</script>
<button onclick="window.location='home.html'">🏠 Home</button>


</body>
</html>
