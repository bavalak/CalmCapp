
<!DOCTYPE html>
<html>
<head>
<title>CalmConnect Login</title>

<style>
body{
margin:0;
height:100vh;
font-family:Segoe UI;
background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee")
no-repeat center center/cover;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:360px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.4);
text-align:center;
color:white;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.3);
color:white;
}

input::placeholder{
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:20px;
background:#5fa4a9;
color:white;
font-size:16px;
cursor:pointer;
margin-top:5px;
}

#error{
margin-top:10px;
color:#ffdede;
}

.toggle{
margin-top:10px;
cursor:pointer;
color:#fff;
text-decoration:underline;
}
</style>
</head>

<body>

<div class="login-box">

<h2>🌿 CalmConnect</h2>
<p id="formTitle">Existing User Login</p>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password (min 6 characters)">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<p id="error"></p>

</div>

<script>

/* REGISTER NEW USER */

function register(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u=="" || p==""){
error.innerText="Please enter username and password";
return;
}

if(p.length<6){
error.innerText="Password must be at least 6 characters";
return;
}

localStorage.setItem("cc_user",u);
localStorage.setItem("cc_pass",p);

error.innerText="Registration successful. Now login.";

}

/* LOGIN EXISTING USER */

function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

let savedUser=localStorage.getItem("cc_user");
let savedPass=localStorage.getItem("cc_pass");

if(p.length<6){
error.innerText="Password must contain at least 6 characters";
return;
}

if(u==savedUser && p==savedPass){

localStorage.setItem("username",u);

window.location="home.html";

}else{

error.innerText="Invalid username or password";

}

}

</script>

</body>
</html>
