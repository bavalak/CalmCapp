<!DOCTYPE html>
<html>
<head>
<title>CalmConnect Login</title>
<link rel="stylesheet" href="style.css">


<style>
body{
    margin:0;
    height:100vh;
    font-family:Segoe UI;
    background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee")
    no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:360px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,0,0,0.4);
    text-align:center;
    color:white;
}

.login-box h2{
    margin-bottom:10px;
}

.login-box p{
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.3);
    color:white;
}

input::placeholder{
    color:white;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#5fa4a9;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#error{
    color:#ffdddd;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="login-box">
<h2>🌿 CalmConnect</h2>
<p>Your safe mental wellness space</p>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<p id="error"></p>
</div>

<script>
function login(){
    var u = username.value;
    var p = password.value;

    if(u==="admin" && p==="1234"){
        window.location="home.html";
    }else{
        error.innerText="Invalid username or password";
    }
}
</script>
<script src="script.js"></script>

  <p>If you are not redirected automatically, <a href="login.html">click here</a>.</p>

</body>
</html>
