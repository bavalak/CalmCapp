<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slow Life Game</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298,#355c7d);
overflow:hidden;
color:white;
}

/* MAIN BOX */

.container{
text-align:center;
width:900px;
}

/* GAME AREA */

.gamebox{
margin-top:30px;
height:220px;
border-radius:20px;
border:2px solid white;
position:relative;
overflow:hidden;

background:linear-gradient(to top,#6dd5ed,#bdefff);
box-shadow:0 0 25px rgba(255,255,255,0.2);
}

/* OCEAN */

.ocean{
position:absolute;
right:0;
top:0;
height:100%;
width:120px;
background:linear-gradient(#3a8edb,#1e6bb8);
animation:wave 3s infinite ease-in-out alternate;
}

@keyframes wave{
0%{transform:translateX(0)}
100%{transform:translateX(5px)}
}

/* TURTLE */

.turtle{
position:absolute;
bottom:25px;
left:20px;
font-size:40px;
transition:0.5s;
filter:drop-shadow(0 0 8px rgba(0,0,0,0.4));
}

/* FOOTPRINTS */

.foot{
position:absolute;
font-size:10px;
opacity:0.4;
}

/* BREATH CIRCLE */

.breath{
margin:auto;
margin-top:20px;
height:90px;
width:90px;
border-radius:50%;
border:3px solid rgba(255,255,255,0.5);
animation:breath 6s infinite;
}

@keyframes breath{

0%{transform:scale(1)}
50%{transform:scale(1.35)}
100%{transform:scale(1)}

}

/* MESSAGE */

.message{
margin-top:15px;
font-size:20px;
opacity:0.9;
}

/* CONFETTI */

.confetti{
position:absolute;
font-size:22px;
animation:fall 3s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-20px) rotate(0deg)}
100%{transform:translateY(260px) rotate(360deg);opacity:0}
}

</style>
</head>

<body>

<div class="container">

<h1>🐢 Slow Life Game</h1>
<p>Tap inside the box slowly to help the turtle reach the ocean.</p>

<div class="breath"></div>

<div class="gamebox" id="game">

<div class="turtle" id="turtle">🐢</div>
<div class="ocean"></div>

</div>

<div class="message" id="message">
Take a slow breath...
</div>

</div>

<script>

let turtle = document.getElementById("turtle")
let game = document.getElementById("game")
let message = document.getElementById("message")

let step = 0
let maxSteps = 8

const messages = [
"Breathe slowly 🌿",
"Peace comes with patience",
"One step at a time",
"Feel the calm",
"Slow progress is still progress",
"Stay present",
"You are doing great"
]

game.onclick = function(e){

if(step>=maxSteps) return

step++

let move = step*90

turtle.style.left = move+"px"

createFootprint(move)

message.innerText = messages[Math.floor(Math.random()*messages.length)]

if(step==maxSteps){
celebrate()
setTimeout(resetGame,3500)
}

}

/* FOOTPRINT */

function createFootprint(x){

let foot = document.createElement("div")

foot.className="foot"

foot.innerText="•"

foot.style.left=(x-30)+"px"
foot.style.bottom="20px"

game.appendChild(foot)

}

/* CONFETTI */

function celebrate(){

for(let i=0;i<30;i++){

let confetti=document.createElement("div")

confetti.className="confetti"

const emojis=["🎉","✨","🎊","💙","💛","💚"]

confetti.innerText=emojis[Math.floor(Math.random()*emojis.length)]

confetti.style.left=Math.random()*800+"px"

game.appendChild(confetti)

}

message.innerText="The turtle reached the ocean 🌊"

}

/* RESET */

function resetGame(){

step=0

turtle.style.left="20px"

document.querySelectorAll(".foot").forEach(e=>e.remove())
document.querySelectorAll(".confetti").forEach(e=>e.remove())

message.innerText="A new peaceful journey begins..."

}

</script>

</body>
</html>
