<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CalmConnect | Home</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin:0;
      height:100vh;
      font-family:'Segoe UI', sans-serif;
      background:rgba(255,255,255,0.15);
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:#fff;
    }
    .cards {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      max-width:600px;
      margin:auto;
    }
    .card {
      background:rgba(255,255,255,0.2);
      padding:30px;
      border-radius:20px;
      font-size:1.2em;
      cursor:pointer;
      text-decoration:none;
      color:#fff;
      transition:transform 0.3s, background 0.3s;
    }
    .card:hover {
      transform:scale(1.05);
      background:rgba(255,255,255,0.3);
    }
    h1 {
      font-size:2.5em;
      margin-bottom:0.2em;
    }
    p {
      font-size:1.2em;
      margin-bottom:2em;
    }
  </style>
</head>
<body>
  <div>
    <h1>🌿 CalmConnect</h1>
    <p>Your safe space to relax, breathe & heal</p>

    <section class="cards">
      <a class="card" href="support.html">💬 helpline</a>
      <a class="card" href="breathing.html">breathe in - out </a>
      <a class="card" href="slowlife.html">help the tortoise </a>
      <a class="card" href="balloons.html">🎮 Stress Relax Game</a>
      <a class="card" href="journal.html">📓 My Journal</a>
    </section>
  </div>
</body>
</html>
