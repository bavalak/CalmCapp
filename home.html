<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CalmConnect | Welcome</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin:0;
      height:100vh;
      font-family:'Segoe UI', sans-serif;
      background:linear-gradient(to top right, #a18cd1, #fbc2eb);
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:#fff;
    }
    .welcome {
      animation: fadeIn 3s ease-in-out;
    }
    h1 {
      font-size:3em;
      margin-bottom:0.2em;
    }
    p {
      font-size:1.2em;
      margin-bottom:1.5em;
    }
    button {
      padding:14px 32px;
      border:none;
      border-radius:30px;
      background:#6a82fb;
      color:#fff;
      font-size:18px;
      cursor:pointer;
      transition:transform 0.3s;
    }
    button:hover {
      transform:scale(1.1);
      background:#fc5c7d;
    }
    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }
  </style>
</head>
<body>
  <div class="welcome">
    <h1>🌿 CalmConnect</h1>
    <p>Your safe space to relax, breathe & heal</p>
    <button onclick="window.location='login.html'">Login to Begin</button>
  </div>
</body>
</html>
