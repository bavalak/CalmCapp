<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CalmConnect Dashboard</title>
  <style>
    body {
      margin:0;
      font-family:'Segoe UI', sans-serif;
      background:linear-gradient(135deg, #89f7fe, #66a6ff, #fbc2eb, #a6c1ee);
      background-size:400% 400%;
      animation: gradientShift 20s ease infinite;
      color:#fff;
    }
    @keyframes gradientShift {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }
    header {
      background:rgba(0,0,0,0.4);
      padding:20px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      backdrop-filter: blur(6px);
    }
    header h2 { margin:0; font-weight:600; }
    button {
      background:#6a82fb;
      color:white;
      border:none;
      padding:10px 22px;
      border-radius:25px;
      cursor:pointer;
      transition: all 0.3s ease;
      font-weight:500;
    }
    button:hover { background:#fc5c7d; transform:scale(1.05); }
    .container {
      padding:40px;
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap:30px;
    }
    .card {
      background:rgba(255,255,255,0.9);
      border-radius:20px;
      padding:25px;
      color:#333;
      box-shadow:0 8px 25px rgba(0,0,0,0.25);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover { transform: translateY(-5px); box-shadow:0 12px 30px rgba(0,0,0,0.35); }
    .stats {
      display:flex;
      gap:15px;
      margin-bottom:20px;
    }
    .stat {
      flex:1;
      background:#f7f9fc;
      border-radius:15px;
      padding:15px;
      text-align:center;
      font-weight:bold;
      box-shadow:0 4px 10px rgba(0,0,0,0.15);
    }
    /* Breathing Circle */
    .breath-wrapper {
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .circle {
      width:180px;
      height:180px;
      border-radius:50%;
      background:radial-gradient(circle, #6a82fb, #fc5c7d);
      box-shadow:0 0 40px rgba(255,255,255,0.6);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      font-weight:bold;
      margin:20px 0;
      transition: transform 6s ease-in-out;
    }
    #breathText { font-size:18px; margin-bottom:10px; font-weight:500; }
    /* Horizontal Quick Links */
    .quick-links {
      display:flex;
      justify-content:center;
      gap:20px;
      margin:30px 0;
      flex-wrap:wrap;
    }
    .quick-links button {
      flex:1;
      max-width:160px;
    }
  </style>
</head>

<body>
<header>
  <h2>🌿 CalmConnect Dashboard</h2>
  <button onclick="goHome()">Home</button>
</header>

<div class="container">

  <!-- Stats -->
  <div class="card">
    <h3>📊 Your Stats</h3>
    <div class="stats">
      <div class="stat" id="avgTime">🕒 Avg: 0 min</div>
      <div class="stat" id="totalTime">⏳ Total: 0 min</div>
      <div class="stat" id="sessions">📈 Sessions: 0</div>
    </div>
  </div>

  <!-- Breathing Meditation -->
  <div class="card">
    <h3>🫁 Breathing Meditation</h3>
    <div class="breath-wrapper">
      <p id="breathText">Click start</p>
      <div class="circle" id="circle">🌿</div>
      <button onclick="startBreathing()">Start Meditation</button>
    </div>
  </div>

</div>

<!-- Horizontal Quick Links -->
<div class="quick-links">
  <button onclick="go('balloons.html')">🎈 Balloon Pop</button>
  <button onclick="go('release.html')">🧘 Release</button>
  <button onclick="go('support.html')">💬 Support</button>
  <button onclick="go('ground.html')">🌱 Ground</button>
  <button onclick="go('reframe.html')">🧠 Reframe</button>
  <button onclick="logout()">Logout</button>
</div>

<script>
function goHome(){ window.location="home.html"; }
function go(page){ window.location=page; }
function logout(){ sessionStorage.clear(); window.location="login.html"; }

/* Stats Tracking */
let sessions = parseInt(localStorage.getItem("sessions") || "0");
let totalTime = parseInt(localStorage.getItem("totalTime") || "0");
function updateStats(){
  document.getElementById("sessions").innerText = "📈 Sessions: " + sessions;
  document.getElementById("totalTime").innerText = "⏳ Total: " + totalTime + " min";
  let avg = sessions ? Math.round(totalTime/sessions) : 0;
  document.getElementById("avgTime").innerText = "🕒 Avg: " + avg + " min";
}
updateStats();

/* Breathing Meditation - shorter cycle */
function startBreathing(){
  let circle = document.getElementById("circle");
  let text = document.getElementById("breathText");

  text.innerText = "Breathe In 🌿";
  circle.style.transform = "scale(1.5)";

  setTimeout(()=>{
    text.innerText = "Hold...";
    circle.style.transform = "scale(2)";
  },3000); // 3s inhale

  setTimeout(()=>{
    text.innerText = "Breathe Out 🌬️";
    circle.style.transform = "scale(1)";
  },6000); // 3s hold + 3s exhale

  setTimeout(()=>{
    text.innerText = "Well done 💖";
    sessions++;
    totalTime += 0.2; // ~12 sec = 0.2 min
    localStorage.setItem("sessions", sessions);
    localStorage.setItem("totalTime", totalTime);
    updateStats();
  },12000); // full cycle
}
</script>

</body>
</html>
