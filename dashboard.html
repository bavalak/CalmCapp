
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CalmConnect Dashboard</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
color:white;
background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover no-repeat;
transition:1s;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(20,40,60,0.55);
z-index:-1;
}

/* HEADER */

header{
background:rgba(0,0,0,0.4);
padding:18px 35px;
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter:blur(6px);
}

header h2{margin:0}

/* THEME SELECTOR */

.theme-selector{
position:absolute;
top:20px;
right:20px;
z-index:20;
}

.theme-selector select{
padding:8px 12px;
border-radius:10px;
border:none;
}

/* CONTAINER */

.container{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.92);
border-radius:20px;
padding:25px;
color:#333;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* STATS */

.stats{
display:flex;
gap:15px;
}

.stat{
flex:1;
background:#f2f6fb;
padding:15px;
border-radius:15px;
text-align:center;
font-weight:bold;
}

/* MEDITATION SLIDER */

.slider{
position:relative;
text-align:center;
}

.slider img{
width:100%;
height:220px;
border-radius:12px;
object-fit:cover;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
font-size:22px;
padding:6px 12px;
cursor:pointer;
border-radius:50%;
}

.left{left:10px}
.right{right:10px}

/* MUSIC */

.music-list button{
display:block;
width:100%;
margin:6px 0;
padding:8px;
}

/* QUICK LINKS */

.quick-links{
display:flex;
justify-content:center;
gap:20px;
margin:30px;
flex-wrap:wrap;
}

button{
background:#5fa4a9;
border:none;
color:white;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
}

button:hover{
background:#4e8d91;
}

</style>
</head>

<body>

<header>
<h2>🌿 CalmConnect Dashboard</h2>
<button onclick="goHome()">Home</button>
</header>

<div class="theme-selector">
<select onchange="setTheme(this.value)">
<option>Select Theme</option>
<option value="forest">🌲 Forest</option>
<option value="ocean">🌊 Ocean</option>
<option value="sunrise">🌅 Sunrise</option>
<option value="mountain">⛰ Mountain</option>
<option value="night">🌙 Night Sky</option>
</select>
</div>

<div class="container">

<!-- STATS -->

<div class="card">
<h3>📊 Your Mindfulness Stats</h3>

<div class="stats">
<div class="stat" id="avgTime">🕒 Avg: 0 min</div>
<div class="stat" id="totalTime">⏳ Total: 0 min</div>
<div class="stat" id="sessions">📈 Sessions: 0</div>
</div>
</div>

<!-- YOGA POSE SLIDER -->

<div class="card">

<h3>🧘 Relaxing Yoga Poses</h3>

<div class="slider" id="slider">

<button class="arrow left" onclick="prevSlide()">❮</button>

<img id="meditationImage">

<button class="arrow right" onclick="nextSlide()">❯</button>

</div>

<p id="poseText"></p>

</div>

<!-- MUSIC -->

<div class="card">

<h3>🎵 Calm Soothing Music</h3>

<div class="music-list">

<button onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')">🌧 Rain Sounds</button>

<button onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3')">🌿 Forest Ambience</button>

<button onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3')">🌊 Ocean Waves</button>

<button onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3')">🎹 Calm Piano</button>

</div>

<audio id="player" controls style="width:100%; margin-top:10px;"></audio>

</div>

</div>

<div class="quick-links">

<button onclick="go('balloons.html')">🎈 Balloon Game</button>
<button onclick="go('support.html')">💬 Support</button>
<button onclick="go('journal.html')">📓 Journal</button>
<button onclick="logout()">Logout</button>

</div>

<script>

/* NAVIGATION */

function goHome(){window.location="home.html"}
function go(p){window.location=p}
function logout(){sessionStorage.clear();window.location="login.html"}

/* STATS */

let sessions=parseInt(localStorage.getItem("sessions")||"0")
let totalTime=parseInt(localStorage.getItem("totalTime")||"0")

function updateStats(){

document.getElementById("sessions").innerText="📈 Sessions: "+sessions
document.getElementById("totalTime").innerText="⏳ Total: "+totalTime+" min"

let avg=sessions?Math.round(totalTime/sessions):0
document.getElementById("avgTime").innerText="🕒 Avg: "+avg+" min"

}

updateStats()

/* MUSIC PLAYER */

function playMusic(src){

let player=document.getElementById("player")

player.pause()
player.src=src
player.load()
player.play()

}

/* THEMES */

function setTheme(theme){

if(theme=="forest")
document.body.style.background="url(https://images.unsplash.com/photo-1500530855697-b586d89ba3ee) center/cover"

if(theme=="ocean")
document.body.style.background="url(https://images.unsplash.com/photo-1507525428034-b723cf961d3e) center/cover"

if(theme=="sunrise")
document.body.style.background="url(https://images.unsplash.com/photo-1502082553048-f009c37129b9) center/cover"

if(theme=="mountain")
document.body.style.background="url(https://images.unsplash.com/photo-1501785888041-af3ef285b470) center/cover"

if(theme=="night")
document.body.style.background="url(https://images.unsplash.com/photo-1500534314209-a25ddb2bd429) center/cover"

}

/* YOGA POSES */

const poses=[

{img:"https://images.unsplash.com/photo-1545389336-cf090694435e",text:"Child’s Pose | Balasana"},
{img:"https://images.unsplash.com/photo-1593810450967-f9c42742e326",text:"Legs-Up-the-Wall Pose | Viparita Karani"},
{img:"https://images.unsplash.com/photo-1506126613408-eca07ce68773",text:"Corpse Pose | Savasana"},
{img:"https://images.unsplash.com/photo-1544367567-0f2fcb009e0b",text:"Easy Pose | Sukhasana"},
{img:"https://images.unsplash.com/photo-1552196563-55cd4e45efb3",text:"Reclining Bound Angle Pose | Supta Baddha Konasana"}

]

let current=0

function showSlide(){
document.getElementById("meditationImage").src=poses[current].img
document.getElementById("poseText").innerText=poses[current].text
}

function nextSlide(){
current=(current+1)%poses.length
showSlide()
}

function prevSlide(){
current=(current-1+poses.length)%poses.length
showSlide()
}

/* SWIPE */

let slider=document.getElementById("slider")
let startX=0

slider.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

slider.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX
if(startX-endX>50) nextSlide()
if(endX-startX>50) prevSlide()
})

showSlide()

</script>

</body>
</html>
